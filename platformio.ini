; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
default_envs = 
	rak4630
boards_dir = rakwireless/boards

[common]
build_flags = 
	-D LIB_DEBUG=0        ; 0 Disable LoRaWAN debug output
monitor_speed = 115200
lib_deps = 
	beegee-tokyo/SX126x-Arduino

[env:rak4630]
platform = nordicnrf52
board = rak4630 
framework = arduino
build_src_filter = ${env.build_src_filter}+<../rakwireless/variants/rak4630>-<rx_test.cpp>-<OPC_read_test.cpp>
build_flags = 
	${common.build_flags}
	-I rakwireless/variants/rak4630
lib_deps = 
	${common.lib_deps}

[env:rak4630_rx]
platform = nordicnrf52
board = rak4630
framework = arduino
build_src_filter = ${env.build_src_filter}+<../rakwireless/variants/rak4630>-<main.cpp>-<OPC_read_test.cpp>
build_flags =
	${common.build_flags}
	-I rakwireless/variants/rak4630
lib_deps =
	${common.lib_deps}

[env:rak4630_opc]
platform = nordicnrf52
board = rak4630
framework = arduino
build_src_filter = ${env.build_src_filter}+<../rakwireless/variants/rak4630>-<main.cpp>-<rx_test.cpp>
build_flags =
	${common.build_flags}
	-I rakwireless/variants/rak4630
lib_deps =
	${common.lib_deps}
